spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: clients-service
          uri: lb://clients-service
          predicates:
            - Path=/api/v1/clientes/**

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:default-secret-key-minimum-32-chars}

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    initial-instance-info-replication-interval-seconds: 5
    instance-info-replication-interval-seconds: 10
