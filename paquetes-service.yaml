spring:
  application:
    name: paquetes-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-paquetes}:5432/rapidocourier_paquetes
    username: ${DB_USERNAME:paquetes_user}
    password: ${DB_PASSWORD:paquetes_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8083

resilience4j:
  circuitbreaker:
    instances:
      clients-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50
        ignore-exceptions:
          - com.rapidocurier.paquetesservice.domain.exception.ResourceNotFoundException

tarifa:
  costo-por-kg: 8.0
  porcentaje-valor-declarado: 0.01
  tarifa-default: 5.0
  rutas:
    LIMA-AREQUIPA: 15.0
    AREQUIPA-LIMA: 15.0
    LIMA-CUSCO: 20.0
    CUSCO-LIMA: 20.0
    AREQUIPA-CUSCO: 12.0
    CUSCO-AREQUIPA: 12.0

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    initial-instance-info-replication-interval-seconds: 5
    instance-info-replication-interval-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,refresh
  endpoint:
    health:
      show-details: always
  circuitbreakers:
    enabled: true
